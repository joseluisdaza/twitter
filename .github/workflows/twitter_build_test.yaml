# Nombre de sugerencia 
name: twitter_build_test
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
# Que es lo que ejecutara la CI / CD
jobs:
  build_test:
    runs-on: ubuntu-latest
#pasos que se ejecutaran en la CI / CD
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.8
      uses: actions/setup-python@v4
      with:
        python-version: 3.8
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov

    - name: Run tests
      run: |
        pytest --cov=twitter_app tests/ 

